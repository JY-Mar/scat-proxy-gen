name: Merge Clash Configurations

on:
  # 定时触发 - 每天的 00 点 01 分（UTC+8） 执行一次任务
  # schedule:
  #   - cron: "1 16 * * *"

  # 手动触发
  workflow_dispatch:
    inputs:
      force_update:
        description: '强制更新配置'
        required: false
        default: false
        type: boolean
      message:
        description: '触发备注'
        required: false
        default: ''
        type: string

  # 仓库 PxyRes 触发
  repository_dispatch:
    types:
      - Triggered From JY-Mar/PxyRes
      - Triggered From JY-Mar/PxySub

  # 当脚本文件更新时触发
  push:
    branches:
      - main
    paths:
      - 'scriptsForPython/**/*.py'
      - 'config/**/*.yaml'
      - 'utils/**/*.py'
      - 'templates/**/*.yaml'
      - 'templates/**/*.html'
      - 'templates/**/*.css'

# 设置权限
permissions:
  contents: read
  pages: write
  id-token: write

# 确保只有一个部署任务同时运行
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  generate-and-merge-config:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Set up locale and encoding
        run: |
          sudo apt-get update
          sudo apt-get install -y locales language-pack-zh-hans
          sudo locale-gen zh_CN.UTF-8
          sudo update-locale LANG=zh_CN.UTF-8
          echo "LANG=zh_CN.UTF-8" >> $GITHUB_ENV
          echo "LC_ALL=zh_CN.UTF-8" >> $GITHUB_ENV
          echo "PYTHONIOENCODING=utf-8" >> $GITHUB_ENV

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML requests

      - name: 🗃️ Create output directory and copy something
        run: |
          mkdir -p docs
          mkdir -p docs/Loon
          curl -L "https://jy-mar.github.io/PxyRes/Loon/Config/scat.lcf" -o "docs/Loon/scat.lcf"
          cp "docs/Loon/scat.lcf" "docs/Loon/scat-ad.lcf"
          mkdir -p docs/Clash
          curl -L "https://jy-mar.github.io/PxyRes/Clash/Config/scat.yaml" -o "docs/Clash/scat.yaml"

      - name: 🧠 Generate merged config
        env:
          GITHUB_TOKEN: ${{ secrets.CLASH_GITHUB_TOKEN }}
          REPO_OWNER: ${{ secrets.CLASH_REPO_OWNER }}
          REPO_NAME: ${{ secrets.CLASH_REPO_NAME }}
          AUTH_TOKEN: ${{ secrets.CLASH_AUTH_TOKEN }}
          REMOTE_TPLS: ${{ vars.CLASH_ENV_REMOTE_TPLS }}
          FCONFS_DIRS: ${{ vars.CLASH_ENV_FCONFS_DIRS }}
          OUTPUT_DIR: docs
          PYTHONIOENCODING: utf-8
          PYTHONLEGACYWINDOWSFSENCODING: utf-8
          PYTHONUTF8: 1
          LC_ALL: zh_CN.UTF-8
          LANG: zh_CN.UTF-8
        run: |
          export PYTHONIOENCODING=utf-8
          export PYTHONUTF8=1
          python -c "import sys; print('Python encoding:', sys.stdout.encoding)"

          PY_FILE="scriptsForPython/merge_clash_config.py"

          python "$PY_FILE"

          # 验证生成的文件编码
          echo "=== ↓↓↓ 检查生成的文件 ↓↓↓ ==="

          # 1. 先去除换行符 \n 和 \r (Windows 兼容)
          # 2. 再去除所有空格
          cleaned_dirs="${FCONFS_DIRS//$'\n'/}"
          cleaned_dirs="${cleaned_dirs//$'\r'/}"
          cleaned_dirs="${cleaned_dirs// /}"

          # 先按 ; 分割
          IFS=';' read -ra groups <<< "$cleaned_dirs"
          NEW_PARAMS=()
          for group in "${groups[@]}"; do
            # 每个 group 再按 | 分割
            IFS='|' read -ra parts <<< "$group"
            # 取第一个元素（即 | 前的部分）
            NEW_PARAMS+=("${parts[0]}")
          done

          len=${#NEW_PARAMS[@]}
          ls -la docs/
          for ((i=0; i<len; i++)); do
            subtype=${NEW_PARAMS[$i]}
            CONFIG_FILE="docs/Clash/${AUTH_TOKEN}/${subtype}.yaml"
            if [ -f "$CONFIG_FILE" ]; then
              file "$CONFIG_FILE"
              # 打印前三行
              # head -3 "$CONFIG_FILE"
              # 仅打印第三行
              sed -n '3p' "$CONFIG_FILE"
              echo "配置文件生成成功: $CONFIG_FILE"
            else
              echo "错误: 配置文件 $CONFIG_FILE 未生成"
              exit 1
            fi
            echo "=== 检查进度 $((i+1)) / $len ==="
          done
          echo "=== ↑↑↑ 文件生成检查完毕 ↑↑↑ ==="

      - name: 🧱 Generate "index.html" from template
        env:
          FCONFS_DIRS: ${{ vars.CLASH_ENV_FCONFS_DIRS }}
        run: |
          # 确保输出目录存在
          mkdir -p docs
          # 读取模板，替换变量，输出到最终位置
          # 注意：使用 envsubst 时，可以指定只替换特定的变量，防止干扰 HTML 里的其他 $ 符号
          envsubst '$FCONFS_DIRS' < templates/github-page/index.html > docs/index.html

      - name: 🧱 Create authentication wrapper
        env:
          AUTH_TOKEN: ${{ secrets.CLASH_AUTH_TOKEN }}
        run: |
          # 创建一个简单的认证包装器
          cat > docs/clash.yaml.php << 'EOF'
          <?php
          // 简单的认证检查
          $required_token = getenv('AUTH_TOKEN') ?: 'your-auth-token';
          $provided_token = $_GET['token'] ?? '';

          if ($provided_token !== $required_token) {
              http_response_code(404);
              echo "Not Found";
              exit;
          }

          // 返回配置文件
          header('Content-Type: application/x-yaml');
          header('Content-Disposition: attachment; filename="clash.yaml"');
          readfile('clash.yaml');
          ?>
          EOF

          # 由于GitHub Pages不支持PHP，我们创建一个JavaScript版本
          cat > docs/get-config.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Clash Config</title>
          </head>
          <body>
              <script>
                  const urlParams = new URLSearchParams(window.location.search);
                  const token = urlParams.get('token');
                  
                  if (token) {
                      // 这里应该是您的认证token
                      const validToken = '${AUTH_TOKEN}';
                      if (token === validToken) {
                          // 重定向到实际的配置文件
                          window.location.href = 'clash-${AUTH_TOKEN}.yaml';
                      } else {
                          // 返回404
                          document.body.innerHTML = '<h1>404 Not Found</h1>';
                          document.title = '404 Not Found';
                      }
                  } else {
                      // 返回404
                      document.body.innerHTML = '<h1>404 Not Found</h1>';
                      document.title = '404 Not Found';
                  }
              </script>
          </body>
          </html>
          EOF

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: generate-and-merge-config

    steps:
      - name: 🧹 Clean up old Deployment Records
        uses: strumwolf/delete-deployment-environment@v3
        with:
          token: ${{ secrets.CLASH_GITHUB_TOKEN }}
          environment: github-pages
          onlyRemoveDeployments: true

      - name: ⬆️ Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
